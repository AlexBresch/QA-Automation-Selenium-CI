# .github/workflows/test.yml
name: Run UI Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox, edge]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      #Snap-based installs were unstable in CI, so I switched to browser-actions for reliability.
      #- name: Install browsers run: | 
      #  sudo apt-get update sudo apt-get install -y chromium-browser firefox

      - name: Setup Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v2
    
      - name: Setup Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1
    
      - name: Setup Edge
        if: matrix.browser == 'edge'
        run: |
          sudo apt update
          sudo apt install -y microsoft-edge-stable || echo "Edge install failed, continuing"
          
      - name: Run tests
        run: |
          pytest -v --browser=${{ matrix.browser }} --headless=true ./Tests
